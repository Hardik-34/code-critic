server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/ai_schema_validator
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

jwt:
   secret: mysupersecretkeymysupersecretkeymysupersecretkey
   expiration: 3600000

openai:
  api-key: ${OPENAI_API_KEY}